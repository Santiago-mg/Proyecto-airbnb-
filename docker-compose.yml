services:
  frontend:
    build:
      context: ./frontend
    container_name: estadiapro-frontend
    environment:
      PORT: 3000
      BACKEND_INTERNAL_URL: http://backend:4000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_started
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: estadiapro-backend
    environment:
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: estadiapro
      DB_USER: root
      DB_PASSWORD: root
      JWT_SECRET: estadiapro-secret-docker
      JWT_EXPIRES_IN: 7d
      FRONTEND_PUBLIC_URL: http://localhost:3000
    ports:
      - "4001:4000"
    depends_on:
      mysql:
        condition: service_healthy
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: estadiapro-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: estadiapro
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
      - name: backend
        image: mariofer2001/estadiapro-backend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 4000
        env:
        - name: PORT
          value: "4000"
        - name: DB_HOST
          value: "mysql"
        - name: DB_PORT
          value: "3306"
        - name: DB_NAME
          value: "estadiapro"
        - name: DB_USER
          value: "root"
        - name: DB_PASSWORD
          value: "root"
        - name: JWT_SECRET
          value: "estadiapro-secret"
        - name: JWT_EXPIRES_IN
          value: "7d"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
  - port: 4000
    targetPort: 4000
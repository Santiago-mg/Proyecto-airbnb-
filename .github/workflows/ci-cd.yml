name: EstadiaPro CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: Pruebas del backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm install

      - name: Ejecutar pruebas del backend
        working-directory: ./backend
        run: npm test

  build-and-push:
    name: Construir y subir imágenes a DockerHub
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Login en DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir y subir imagen del backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/estadiapro-backend:latest ./backend
          docker push ${{ secrets.DOCKER_USERNAME }}/estadiapro-backend:latest

      - name: Construir y subir imagen del frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/estadiapro-frontend:latest ./frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/estadiapro-frontend:latest
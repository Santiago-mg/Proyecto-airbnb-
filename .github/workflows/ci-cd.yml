name: EstadiaPro CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test-backend:
    name: Pruebas del backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias del backend
        working-directory: ./backend
        run: npm install

      - name: Ejecutar pruebas del backend
        working-directory: ./backend
        run: npm test

  build-images:
    name: Construir imágenes Docker
    runs-on: ubuntu-latest
    needs: test-backend
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Construir imagen del backend
        run: docker build -t estadiapro-backend:ci ./backend

      - name: Construir imagen del frontend
        run: docker build -t estadiapro-frontend:ci ./frontend

